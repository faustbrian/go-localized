name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Local release gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          cache: false
      - run: go mod tidy -diff
      - run: make format-check
      - run: ./scripts/check-go-safety.sh
      - run: make vet
      - run: make test-race
      - run: make coverage
      - run: make fuzz FUZZ_TIME=2s
      - run: make benchmark BENCH_TIME=1x
      - run: make standards
      - run: make docs
      - run: make api-check
      - run: make workflow-lint
  lint:
    name: Strict golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          cache: false
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m
  nilaway:
    name: Advisory NilAway
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          cache: false
      - run: go run go.uber.org/nilaway/cmd/nilaway@v0.0.0-20260710181136-2378218750e4 -include-pkgs='github.com/faustbrian/go-localized/...' ./...
  compatibility:
    name: Go 1.26 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          cache: false
      - run: go test ./...
