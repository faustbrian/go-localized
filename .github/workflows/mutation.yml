name: Mutation

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "37 2 * * 1"

permissions:
  contents: read

jobs:
  mutation:
    name: Decision mutation checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          cache: false
      - run: make mutation
