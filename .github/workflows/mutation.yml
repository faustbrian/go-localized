name: Mutation

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "37 2 * * 1"

permissions:
  contents: read

jobs:
  mutation:
    name: Decision mutation checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x
          cache: false
      - run: make mutation
