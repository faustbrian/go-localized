name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  verify:
    name: Verify release locally reproducible gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x
          cache: false
      - name: Validate tag and changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]
          test "$(git rev-parse "${tag}^{commit}")" = "$(git rev-parse HEAD)"
          version="${tag#v}"
          grep -Eq "^## \[${version//./\\.}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md
      - run: go mod tidy -diff
      - run: make check FUZZ_TIME=10s BENCH_TIME=1x
      - run: make mutation
  publish:
    name: Publish deterministic source archive
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Build source archive and notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mkdir -p dist
          git archive --format=tar --prefix="go-localized-${tag}/" "$tag" |
            gzip -n > "dist/go-localized-${tag}.tar.gz"
          sha256sum "dist/go-localized-${tag}.tar.gz" > "dist/go-localized-${tag}.checksums.txt"
          version="${tag#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\] - " { found = 1; capture = 1; next }
            capture && /^## \\[/ { exit }
            capture { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --title "$GITHUB_REF_NAME" --notes-file release-notes.md
