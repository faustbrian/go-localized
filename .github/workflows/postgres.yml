name: PostgreSQL

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  integration:
    name: PostgreSQL ${{ matrix.postgres }} JSONB
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: [14, 15, 16, 17, 18]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: localized
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d localized"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x
          cache: false
      - run: make postgres POSTGRES_URL='postgres://postgres:postgres@127.0.0.1:5432/localized?sslmode=disable'
