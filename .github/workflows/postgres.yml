name: PostgreSQL

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  integration:
    name: PostgreSQL ${{ matrix.postgres }} JSONB
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: [14, 15, 16, 17, 18]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: localized
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d localized"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          cache: false
      - run: make postgres POSTGRES_URL='postgres://postgres:postgres@127.0.0.1:5432/localized?sslmode=disable'
